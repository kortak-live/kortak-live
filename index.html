    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding-top: 50px; }
        .btn-main { 
            display: block; width: 80%; max-width: 300px; margin: 20px auto; 
            padding: 20px; background: #1e293b; border: 2px solid #3b82f6; 
            color: white; text-decoration: none; border-radius: 15px; font-size: 20px; font-weight: bold;
            transition: 0.3s;
        }
        .btn-main:hover { background: #3b82f6; }
    </style>
</head>
<link rel="icon" type="image/jpeg" href="العشقق.jpg">

<body>

    <h1>مرحباً بك في كورتك ليف</h1>
    <p>اختر الجدول الذي تريد استعراضه:</p>
    
    <a href="today.html" class="btn-main">📅 مباريات اليوم</a>
    <a href="tomorrow.html" class="btn-main">📅 مباريات غداً</a>

    <script>
        let clickCount = 0;
        // رابط الـ Direct Link بتاعك اللي جبته من Adsterra
        const adUrl = "https://www.profitablecpmratenetwork.com/qn99kcg0a0?key=fcc5c0df496e95dc276d3045391be745"; 

        document.addEventListener('click', function(e) {
            // لو المستخدم داس أقل من 4 مرات (يعني أول 3 دوسات إعلانات)
            if (clickCount < 3) {
                clickCount++;
                
                // افتح الإعلان في صفحة جديدة
                window.open(adUrl, '_blank');

                // لو داس على زرار، نمنعه يفتح الجدول لحد ما يخلص الـ 3 إعلانات
                if (e.target.closest('a')) {
                    e.preventDefault();
                }
            } 
            // من الضغطة الرابعة، اللينك هيشتغل عادي
        });
    </script>

</body>
